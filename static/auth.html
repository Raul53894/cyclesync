<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SYNCD — Sign In</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="auth-page">

  <div class="auth-logo">SYNCD<span class="brand-dot">.</span></div>
  <p class="auth-tagline">Ride together, wherever you are.</p>

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="showTab('login')">Log In</button>
      <button class="auth-tab" id="tab-signup" onclick="showTab('signup')">Sign Up</button>
    </div>

    <!-- Login form -->
    <div id="form-login" class="auth-form">
      <div id="login-error" class="error-banner"></div>
      <div class="input-group" style="margin-bottom:12px;">
        <label class="input-label">Email</label>
        <input class="inp" type="email" id="login-email"
               placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="input-group" style="margin-bottom:20px;">
        <label class="input-label">Password</label>
        <input class="inp" type="password" id="login-password"
               placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button class="btn btn-primary" type="button" id="btn-login" onclick="handleLogin()" style="width:100%;">Log In</button>
      <p class="auth-footer">
        New here? <a href="#" onclick="showTab('signup');return false;">Create an account</a>
      </p>
    </div>

    <!-- Sign up form -->
    <div id="form-signup" style="display:none;">
      <div id="signup-form-wrap" class="auth-form">
        <div id="signup-error" class="error-banner"></div>
        <div class="input-group" style="margin-bottom:12px;">
          <label class="input-label">Display Name</label>
          <input class="inp" type="text" id="signup-name"
                 placeholder="Your name" required autocomplete="name" />
        </div>
        <div class="input-group" style="margin-bottom:12px;">
          <label class="input-label">Email</label>
          <input class="inp" type="email" id="signup-email"
                 placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="input-group" style="margin-bottom:20px;">
          <label class="input-label">Password</label>
          <input class="inp" type="password" id="signup-password"
                 placeholder="Min. 6 characters" required autocomplete="new-password" minlength="6" />
        </div>
        <button class="btn btn-primary" type="button" id="btn-signup" onclick="handleSignup()" style="width:100%;">Create Account</button>
        <p class="auth-footer">
          Already have an account? <a href="#" onclick="showTab('login');return false;">Log in</a>
        </p>
      </div>

      <!-- Email confirmation state -->
      <div id="signup-confirm" class="confirm-box" style="display:none;">
        <div class="confirm-icon">📧</div>
        <p style="font-weight:600;font-size:1rem;color:var(--text);">Check your email</p>
        <p style="color:var(--text-muted);font-size:13px;margin-top:8px;line-height:1.6;">
          We sent a confirmation link to
          <strong id="confirm-email" style="color:var(--text);"></strong>.<br/>
          Click it to activate your account, then log in.
        </p>
        <button class="btn btn-secondary" onclick="showTab('login')" style="width:100%;margin-top:20px;">
          Back to Log In
        </button>
      </div>
    </div>
  </div>

</div>

<script>
  let _supabase = null;

  async function initSupabase() {
    try {
      const res = await fetch('/config');
      const cfg = await res.json();
      if (!cfg.supabase_url || !cfg.supabase_anon_key) {
        showError('login', 'Auth is not configured. Check that SUPABASE_ANON_KEY is set.');
        return;
      }
      _supabase = window.supabase.createClient(cfg.supabase_url, cfg.supabase_anon_key);
      const { data: { session } } = await _supabase.auth.getSession();
      if (session) window.location.href = '/';
    } catch (e) {
      showError('login', 'Could not connect to auth service. Please try again.');
    }
  }

  initSupabase();

  function showTab(tab) {
    document.getElementById('form-login').style.display = tab === 'login' ? '' : 'none';
    document.getElementById('form-signup').style.display = tab === 'signup' ? '' : 'none';
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  }

  function showError(form, msg) {
    const el = document.getElementById(form + '-error');
    el.textContent = msg;
    el.style.display = '';
  }

  function hideError(form) {
    const el = document.getElementById(form + '-error');
    if (el) el.style.display = 'none';
  }

  function setLoading(btnId, loading, label) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.textContent = loading ? 'Please wait…' : label;
  }

  async function handleLogin() {
    if (!_supabase) { showError('login', 'Auth service not ready. Please refresh.'); return; }
    hideError('login');
    setLoading('btn-login', true, 'Log In');
    try {
      const { error } = await _supabase.auth.signInWithPassword({
        email: document.getElementById('login-email').value.trim(),
        password: document.getElementById('login-password').value,
      });
      if (error) { showError('login', error.message); setLoading('btn-login', false, 'Log In'); }
      else window.location.href = '/';
    } catch (e) {
      showError('login', 'Something went wrong. Please try again.');
      setLoading('btn-login', false, 'Log In');
    }
  }

  async function handleSignup() {
    if (!_supabase) { showError('signup', 'Auth service not ready. Please refresh.'); return; }
    hideError('signup');
    setLoading('btn-signup', true, 'Create Account');
    const name = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    try {
      const { error } = await _supabase.auth.signUp({
        email, password,
        options: { data: { full_name: name } },
      });
      if (error) {
        showError('signup', error.message);
        setLoading('btn-signup', false, 'Create Account');
      } else {
        document.getElementById('signup-form-wrap').style.display = 'none';
        document.getElementById('confirm-email').textContent = email;
        document.getElementById('signup-confirm').style.display = '';
      }
    } catch (e) {
      showError('signup', 'Something went wrong. Please try again.');
      setLoading('btn-signup', false, 'Create Account');
    }
  }

  document.getElementById('login-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
  document.getElementById('signup-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSignup();
  });
</script>
</body>
</html>
