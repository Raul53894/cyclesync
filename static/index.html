<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CycleSync</title>
    <link rel="stylesheet" href="/static/style.css?v=3">
</head>
<body>
<div class="card">
    <div class="toolbar">
        <button class="icon-btn" onclick="toggleTheme()" id="theme-btn" title="Toggle light/dark mode">💡</button>
    </div>
    <h1>CycleSync</h1>
    <h2 style="color:var(--muted);">Synchronized cycling workouts with friends</h2>

    <div id="join-section">
        <input type="text" id="join-code" placeholder="Enter session code (e.g. AB1C2D)" maxlength="6" style="text-transform:uppercase">
        <input type="text" id="join-name" placeholder="Your name">
        <button onclick="joinSession()">Join Session</button>
        <button class="secondary" onclick="showHost()">Host a Session</button>
    </div>

    <div id="host-section" class="hidden">
        <input type="text" id="host-name" placeholder="Your name (host)">
        <input type="text" id="session-name-input" placeholder="Session name (optional, e.g. Morning Ride)">
        <button onclick="createSession()">Create Session</button>
        <button class="secondary" onclick="showJoin()">Back</button>
    </div>
</div>

<script>
    // Apply saved theme on load
    const savedTheme = localStorage.getItem('cyclesync-theme') || 'dark';
    if (savedTheme === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
        document.getElementById('theme-btn').textContent = '💡';
    }

    function toggleTheme() {
        const isLight = document.documentElement.getAttribute('data-theme') === 'light';
        const next = isLight ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', next === 'dark' ? '' : 'light');
        document.getElementById('theme-btn').textContent = '💡';
        localStorage.setItem('cyclesync-theme', next);
    }

    function showHost() {
        document.getElementById('join-section').classList.add('hidden');
        document.getElementById('host-section').classList.remove('hidden');
    }

    function showJoin() {
        document.getElementById('host-section').classList.add('hidden');
        document.getElementById('join-section').classList.remove('hidden');
    }

    async function createSession() {
        const name = document.getElementById('host-name').value.trim();
        if (!name) return alert('Please enter your name');
        const sessionName = document.getElementById('session-name-input').value.trim();

        const res = await fetch('/create-session', { method: 'POST' });
        const data = await res.json();
        let url = `/host?code=${data.code}&name=${encodeURIComponent(name)}`;
        if (sessionName) url += `&session=${encodeURIComponent(sessionName)}`;
        window.location.href = url;
    }

    function joinSession() {
        const code = document.getElementById('join-code').value.trim().toUpperCase();
        const name = document.getElementById('join-name').value.trim();
        if (!code || !name) return alert('Please enter both a code and your name');
        window.location.href = `/session?code=${code}&name=${encodeURIComponent(name)}`;
    }
</script>
</body>
</html>
