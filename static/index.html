<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CycleSync</title>
    <link rel="stylesheet" href="/static/style.css?v=3">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="card">
    <div class="toolbar">
        <button class="icon-btn" onclick="toggleTheme()" id="theme-btn" title="Toggle light/dark mode">💡</button>
        <a href="/account" id="account-btn" style="display:none;">
            <button class="secondary" style="padding:6px 14px; font-size:0.8rem; min-height:unset;">My Account</button>
        </a>
        <button class="secondary" id="logout-btn" onclick="logout()" style="display:none; padding:6px 14px; font-size:0.8rem; min-height:unset;">Log out</button>
    </div>
    <h1>CycleSync</h1>
    <h2 style="color:var(--muted);">Synchronized cycling workouts with friends</h2>

    <div id="join-section">
        <input type="text" id="join-code" placeholder="Enter session code (e.g. AB1C2D)" maxlength="6" style="text-transform:uppercase">
        <input type="text" id="join-name" placeholder="Your name">
        <button onclick="joinSession()">Join Session</button>
        <button class="secondary" onclick="showHost()">Host a Session</button>
    </div>

    <div id="host-section" class="hidden">
        <!-- Name input shown only when not logged in -->
        <input type="text" id="host-name" placeholder="Your name (host)" id="host-name">
        <input type="text" id="session-name-input" placeholder="Session name (optional, e.g. Morning Ride)">
        <button onclick="createSession()">Create Session</button>
        <button class="secondary" onclick="showJoin()">Back</button>
    </div>
</div>

<script>
    // Apply saved theme on load
    const savedTheme = localStorage.getItem('cyclesync-theme') || 'dark';
    if (savedTheme === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
        document.getElementById('theme-btn').textContent = '💡';
    }

    let _supabase = null;
    let _session = null;

    async function initAuth() {
        try {
            const res = await fetch('/config');
            const cfg = await res.json();
            if (!cfg.supabase_url) return; // no auth configured (local dev)
            _supabase = window.supabase.createClient(cfg.supabase_url, cfg.supabase_anon_key);
            const { data } = await _supabase.auth.getSession();
            _session = data.session;
            if (_session) {
                document.getElementById('logout-btn').style.display = '';
                document.getElementById('account-btn').style.display = '';
            }
        } catch (e) {
            // auth not available, continue without it
        }
    }

    async function logout() {
        if (!_supabase) return;
        await _supabase.auth.signOut();
        window.location.reload();
    }

    initAuth();

    function toggleTheme() {
        const isLight = document.documentElement.getAttribute('data-theme') === 'light';
        const next = isLight ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', next === 'dark' ? '' : 'light');
        document.getElementById('theme-btn').textContent = '💡';
        localStorage.setItem('cyclesync-theme', next);
    }

    async function showHost() {
        // Ensure auth is ready before proceeding
        if (!_supabase) await initAuth();

        if (_supabase && !_session) {
            // Not logged in — redirect to auth, return here after
            window.location.href = '/auth';
            return;
        }

        document.getElementById('join-section').classList.add('hidden');
        document.getElementById('host-section').classList.remove('hidden');

        // Pre-fill host name from account, hide the input
        if (_session) {
            const name = _session.user.user_metadata?.full_name || _session.user.email.split('@')[0];
            const nameInput = document.getElementById('host-name');
            nameInput.value = name;
            nameInput.style.display = 'none';
        }
    }

    function showJoin() {
        document.getElementById('host-section').classList.add('hidden');
        document.getElementById('join-section').classList.remove('hidden');
    }

    async function createSession() {
        const name = document.getElementById('host-name').value.trim();
        if (!name) return alert('Please enter your name');
        const sessionName = document.getElementById('session-name-input').value.trim();

        const headers = { 'Content-Type': 'application/json' };
        if (_session?.access_token) {
            headers['Authorization'] = `Bearer ${_session.access_token}`;
        }

        const res = await fetch('/create-session', { method: 'POST', headers });
        const data = await res.json();

        let url = `/host?code=${data.code}&name=${encodeURIComponent(name)}`;
        if (sessionName) url += `&session=${encodeURIComponent(sessionName)}`;
        if (_session?.access_token) url += `&token=${encodeURIComponent(_session.access_token)}`;
        window.location.href = url;
    }

    function joinSession() {
        const code = document.getElementById('join-code').value.trim().toUpperCase();
        const name = document.getElementById('join-name').value.trim();
        if (!code || !name) return alert('Please enter both a code and your name');
        window.location.href = `/session?code=${code}&name=${encodeURIComponent(name)}`;
    }
</script>
</body>
</html>
