<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CycleSync — My Account</title>
  <link rel="stylesheet" href="/static/style.css?v=3" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ── Layout ── */
    body { min-height: 100vh; }
    .page { max-width: 860px; margin: 0 auto; padding: 24px 16px 80px; }

    /* ── Header ── */
    .acct-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 28px; padding-bottom: 20px;
      border-bottom: 1px solid var(--card-border);
    }
    .acct-header h2 { margin: 0; font-size: 1.3rem; font-weight: 700; flex: 1; }
    .acct-header .user-label { font-size: 0.82rem; color: var(--muted); }
    .back-btn {
      background: none; border: 1px solid var(--card-border); color: var(--muted);
      padding: 7px 14px; border-radius: 8px; font-size: 0.82rem; cursor: pointer;
      min-height: unset; transition: color 0.2s, border-color 0.2s;
    }
    .back-btn:hover { color: var(--text); border-color: var(--text); background: none; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 0; margin-bottom: 28px; border-bottom: 2px solid var(--card-border); }
    .tab {
      padding: 12px 20px; background: none; border: none; cursor: pointer;
      font-size: 0.9rem; font-weight: 600; color: var(--muted);
      border-bottom: 2px solid transparent; margin-bottom: -2px; min-height: unset;
      transition: color 0.2s;
    }
    .tab.active { color: var(--green); border-bottom-color: var(--green); }
    .tab:hover:not(.active) { color: var(--text); background: none; }

    /* ── Section panels ── */
    .section { display: none; }
    .section.active { display: block; }

    /* ── Cards grid ── */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }

    /* ── Session / workout card ── */
    .item-card {
      background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px;
      padding: 18px 20px; cursor: pointer; transition: border-color 0.2s, transform 0.15s;
    }
    .item-card:hover { border-color: var(--green); transform: translateY(-1px); }
    .item-card-title { font-size: 1rem; font-weight: 700; margin-bottom: 6px; color: var(--text); }
    .item-card-meta { display: flex; gap: 10px; flex-wrap: wrap; }
    .item-meta-chip {
      font-size: 0.78rem; color: var(--muted); background: rgba(255,255,255,0.05);
      border-radius: 5px; padding: 3px 8px;
    }

    /* ── Empty / loading states ── */
    .empty-state {
      text-align: center; padding: 48px 16px; color: var(--muted);
    }
    .empty-state p { margin: 8px 0 0; font-size: 0.9rem; }
    .loading-state { text-align: center; padding: 48px 16px; color: var(--muted); font-size: 0.9rem; }

    /* ── Modal overlay ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 100;
      align-items: flex-start; justify-content: center;
      padding: 20px 12px; overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 16px; width: 100%; max-width: 640px;
      padding: 28px; position: relative; margin: auto;
    }
    .modal-close {
      position: absolute; top: 18px; right: 18px;
      background: none; border: none; color: var(--muted);
      font-size: 1.2rem; cursor: pointer; padding: 4px 8px; min-height: unset;
    }
    .modal-close:hover { color: var(--text); background: none; }
    .modal h3 { font-size: 1.2rem; font-weight: 700; margin: 0 0 18px; padding-right: 32px; }

    /* ── Detail meta row ── */
    .detail-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .detail-chip {
      font-size: 0.8rem; padding: 5px 11px; border-radius: 20px;
      background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid var(--card-border);
    }

    /* ── Effort graph ── */
    .effort-graph { margin-bottom: 20px; }
    .effort-graph-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .effort-bars { display: flex; height: 36px; border-radius: 8px; overflow: hidden; gap: 1px; }
    .effort-bar { height: 100%; transition: opacity 0.2s; flex-shrink: 0; }
    .effort-bar:hover { opacity: 0.8; }

    /* ── Block breakdown ── */
    .block-section { margin-bottom: 16px; }
    .block-section-title {
      font-size: 0.78rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
    }
    .interval-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .interval-table th {
      text-align: left; color: var(--muted); font-weight: 500;
      padding: 4px 8px 8px 0; font-size: 0.75rem; border-bottom: 1px solid var(--card-border);
    }
    .interval-table td { padding: 8px 8px 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .interval-table tr:last-child td { border-bottom: none; }
    .effort-dot {
      display: inline-block; width: 10px; height: 10px; border-radius: 50%;
      margin-right: 6px; vertical-align: middle;
    }

    /* ── Participants list ── */
    .participants-section { margin-bottom: 20px; }
    .participants-section .section-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .participants-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .p-chip {
      font-size: 0.82rem; padding: 4px 11px; border-radius: 20px;
      background: rgba(34,255,102,0.08); border: 1px solid rgba(34,255,102,0.2); color: var(--green);
    }

    /* ── Settings form ── */
    .settings-section { max-width: 420px; }
    .settings-group { margin-bottom: 24px; }
    .settings-group label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .settings-group input { width: 100%; box-sizing: border-box; }
    .settings-group input[readonly] { opacity: 0.5; cursor: not-allowed; }
    .settings-feedback { font-size: 0.85rem; margin-top: 8px; display: none; }
    .settings-feedback.ok { color: var(--green); display: block; }
    .settings-feedback.err { color: var(--danger); display: block; }

    .logout-btn {
      margin-top: 32px; padding-top: 28px; border-top: 1px solid var(--card-border);
    }
    .logout-btn button {
      background: rgba(255,26,26,0.1); border: 1px solid var(--danger);
      color: var(--danger); padding: 10px 24px; min-height: unset; font-size: 0.9rem;
    }
    .logout-btn button:hover { background: rgba(255,26,26,0.2); }

    /* ── Modal action row ── */
    .modal-actions { display: flex; gap: 10px; margin-top: 24px; flex-wrap: wrap; }
    .modal-actions button { flex: 1; min-width: 120px; min-height: unset; padding: 11px 16px; font-size: 0.9rem; }
    .btn-danger {
      background: rgba(255,26,26,0.1) !important; border: 1px solid var(--danger) !important;
      color: var(--danger) !important;
    }
    .btn-danger:hover { background: rgba(255,26,26,0.2) !important; }
  </style>
</head>
<body>
  <div class="toolbar">
    <div></div>
    <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme">💡</button>
  </div>

  <div class="page">
    <div class="acct-header">
      <button class="back-btn" onclick="window.location.href='/'">← Home</button>
      <div>
        <h2>My Account</h2>
        <div class="user-label" id="user-label"></div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-history" onclick="showTab('history')">History</button>
      <button class="tab" id="tab-saved" onclick="showTab('saved')">Saved Workouts</button>
      <button class="tab" id="tab-settings" onclick="showTab('settings')">Settings</button>
    </div>

    <!-- ── History ── -->
    <div class="section active" id="section-history">
      <div id="history-loading" class="loading-state">Loading sessions...</div>
      <div id="history-empty" class="empty-state" style="display:none">
        <div style="font-size:2rem">🚴</div>
        <p>No sessions yet. Host a workout to see your history here.</p>
      </div>
      <div class="cards-grid" id="history-cards"></div>
    </div>

    <!-- ── Saved Workouts ── -->
    <div class="section" id="section-saved">
      <div id="saved-loading" class="loading-state">Loading saved workouts...</div>
      <div id="saved-empty" class="empty-state" style="display:none">
        <div style="font-size:2rem">💾</div>
        <p>No saved workouts yet. Use the <strong>Save Workout</strong> button in the builder to save one.</p>
        <button class="secondary" onclick="window.location.href='/'" style="margin-top:16px; width:auto; padding:10px 20px; min-height:unset;">Go to Builder</button>
      </div>
      <div class="cards-grid" id="saved-cards"></div>
    </div>

    <!-- ── Settings ── -->
    <div class="section" id="section-settings">
      <div class="settings-section">
        <div class="settings-group">
          <label>Display Name</label>
          <input type="text" id="settings-name" placeholder="Your display name" />
        </div>
        <div class="settings-group">
          <label>Email</label>
          <input type="email" id="settings-email" readonly />
        </div>
        <button onclick="saveSettings()" style="width:auto; padding:10px 24px; min-height:unset; font-size:0.9rem;">Save Changes</button>
        <div class="settings-feedback" id="settings-feedback"></div>

        <div class="logout-btn">
          <button onclick="logout()">Log Out</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Session Detail Modal ── -->
  <div class="modal-overlay" id="session-modal" onclick="closeModal('session-modal')">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal('session-modal')">✕</button>
      <h3 id="modal-session-title"></h3>
      <div class="detail-meta" id="modal-session-meta"></div>
      <div class="participants-section" id="modal-participants" style="display:none">
        <div class="section-label">Riders</div>
        <div class="participants-chips" id="modal-participants-list"></div>
      </div>
      <div class="effort-graph" id="modal-effort-graph" style="display:none">
        <div class="effort-graph-label">Effort over time</div>
        <div class="effort-bars" id="modal-effort-bars"></div>
      </div>
      <div id="modal-session-blocks"></div>
    </div>
  </div>

  <!-- ── Saved Workout Preview Modal ── -->
  <div class="modal-overlay" id="workout-modal" onclick="closeModal('workout-modal')">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal('workout-modal')">✕</button>
      <h3 id="modal-workout-title"></h3>
      <div class="detail-meta" id="modal-workout-meta"></div>
      <div id="modal-workout-blocks"></div>
      <div class="modal-actions">
        <button id="modal-workout-start" onclick="startSavedWorkout()">Start Session</button>
        <button class="btn-danger secondary" onclick="deleteSavedWorkout()">Delete</button>
      </div>
    </div>
  </div>

  <script>
    let _supabase = null;
    let _token = null;
    let _user = null;
    let _activeWorkoutId = null;

    // ── Theme ────────────────────────────────────────────────────────────────
    const _theme = localStorage.getItem('cyclesync-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', _theme);
    function toggleTheme() {
      const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('cyclesync-theme', t);
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    async function init() {
      const res = await fetch('/config');
      const cfg = await res.json();
      if (!cfg.supabase_url) { window.location.href = '/auth'; return; }
      _supabase = window.supabase.createClient(cfg.supabase_url, cfg.supabase_anon_key);
      const { data: { session } } = await _supabase.auth.getSession();
      if (!session) { window.location.href = '/auth'; return; }
      _token = session.access_token;
      _user = session.user;
      const name = _user.user_metadata?.full_name || _user.email.split('@')[0];
      document.getElementById('user-label').textContent = _user.email;
      document.getElementById('settings-name').value = name;
      document.getElementById('settings-email').value = _user.email;
      loadHistory();
      loadSaved();
    }
    init();

    // ── Tabs ─────────────────────────────────────────────────────────────────
    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('section-' + tab).classList.add('active');
    }

    // ── Helpers ──────────────────────────────────────────────────────────────
    function authHeaders() {
      return { 'Authorization': `Bearer ${_token}`, 'Content-Type': 'application/json' };
    }

    function fmtDuration(secs) {
      if (!secs) return '—';
      const m = Math.floor(secs / 60), s = secs % 60;
      return s > 0 ? `${m}m ${s}s` : `${m}m`;
    }

    function fmtDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function effortColor(pct) {
      const hue = Math.round(120 - pct * 1.2);
      return `hsl(${Math.max(0, hue)}, 100%, 50%)`;
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('open');
    }

    // ── Session History ───────────────────────────────────────────────────────
    async function loadHistory() {
      const res = await fetch('/api/sessions', { headers: authHeaders() });
      const sessions = res.ok ? await res.json() : [];
      document.getElementById('history-loading').style.display = 'none';
      if (!sessions.length) {
        document.getElementById('history-empty').style.display = 'block';
        return;
      }
      const grid = document.getElementById('history-cards');
      sessions.forEach(s => {
        const participants = s.participants || [];
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
          <div class="item-card-title">${s.name || 'Untitled Session'}</div>
          <div class="item-card-meta">
            <span class="item-meta-chip">${fmtDate(s.started_at || s.created_at)}</span>
            <span class="item-meta-chip">${fmtDuration(s.total_time_seconds)}</span>
            ${participants.length ? `<span class="item-meta-chip">${participants.length} rider${participants.length !== 1 ? 's' : ''}</span>` : ''}
          </div>`;
        card.onclick = () => openSessionModal(s.id);
        grid.appendChild(card);
      });
    }

    async function openSessionModal(sessionId) {
      const res = await fetch(`/api/sessions/${sessionId}`, { headers: authHeaders() });
      if (!res.ok) return;
      const s = await res.json();

      document.getElementById('modal-session-title').textContent = s.name || 'Untitled Session';

      // Meta chips
      const meta = document.getElementById('modal-session-meta');
      meta.innerHTML = [
        fmtDate(s.started_at || s.created_at),
        fmtDuration(s.total_time_seconds),
        s.host_name ? `Host: ${s.host_name}` : '',
      ].filter(Boolean).map(t => `<span class="detail-chip">${t}</span>`).join('');

      // Participants
      const participants = s.participants || [];
      if (participants.length) {
        document.getElementById('modal-participants').style.display = '';
        document.getElementById('modal-participants-list').innerHTML =
          participants.map(p => `<span class="p-chip">🚴 ${p.name}</span>`).join('');
      } else {
        document.getElementById('modal-participants').style.display = 'none';
      }

      // Blocks — sort by index
      const blocks = (s.blocks || []).sort((a, b) => a.block_index - b.block_index);

      // Effort graph
      if (blocks.length) {
        document.getElementById('modal-effort-graph').style.display = '';
        buildEffortGraph(blocks);
      } else {
        document.getElementById('modal-effort-graph').style.display = 'none';
      }

      // Block breakdown
      document.getElementById('modal-session-blocks').innerHTML = renderBlockBreakdown(blocks);

      document.getElementById('session-modal').classList.add('open');
    }

    function buildEffortGraph(blocks) {
      // Expand intervals accounting for reps
      const expanded = [];
      blocks.forEach(b => {
        for (let r = 0; r < (b.rep_count || 1); r++) {
          (b.intervals || []).forEach(iv => expanded.push(iv));
        }
      });
      const total = expanded.reduce((s, iv) => s + (iv.duration_seconds || 0), 0);
      const bars = document.getElementById('modal-effort-bars');
      bars.innerHTML = expanded.map(iv => {
        const pct = total > 0 ? (iv.duration_seconds / total * 100) : 0;
        const color = effortColor(iv.effort_percent || 0);
        return `<div class="effort-bar" style="flex:${iv.duration_seconds};background:${color};" title="${iv.label} — ${iv.effort_percent}%"></div>`;
      }).join('');
    }

    function renderBlockBreakdown(blocks) {
      if (!blocks.length) return '<p style="color:var(--muted);font-size:0.88rem;">No interval data.</p>';
      return blocks.map((b, i) => `
        <div class="block-section">
          <div class="block-section-title">Block ${i + 1}${b.rep_count > 1 ? ` × ${b.rep_count} reps` : ''}</div>
          <table class="interval-table">
            <thead><tr><th>Interval</th><th>Effort</th><th>Duration</th></tr></thead>
            <tbody>
              ${(b.intervals || []).map(iv => `
                <tr>
                  <td>${iv.label || '—'}</td>
                  <td><span class="effort-dot" style="background:${effortColor(iv.effort_percent||0)}"></span>${iv.effort_percent || 0}%</td>
                  <td>${fmtDuration(iv.duration_seconds)}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>`).join('');
    }

    // ── Saved Workouts ────────────────────────────────────────────────────────
    async function loadSaved() {
      const res = await fetch('/api/workouts', { headers: authHeaders() });
      const workouts = res.ok ? await res.json() : [];
      document.getElementById('saved-loading').style.display = 'none';
      if (!workouts.length) {
        document.getElementById('saved-empty').style.display = 'block';
        return;
      }
      const grid = document.getElementById('saved-cards');
      workouts.forEach(w => {
        const blocks = w.blocks_json?.blocks || [];
        const blockCount = blocks.length;
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
          <div class="item-card-title">${w.name}</div>
          <div class="item-card-meta">
            <span class="item-meta-chip">${fmtDuration(w.total_duration_seconds)}</span>
            <span class="item-meta-chip">${blockCount} block${blockCount !== 1 ? 's' : ''}</span>
            <span class="item-meta-chip">${fmtDate(w.created_at)}</span>
          </div>`;
        card.onclick = () => openWorkoutModal(w);
        grid.appendChild(card);
      });
    }

    function openWorkoutModal(workout) {
      _activeWorkoutId = workout.id;
      document.getElementById('modal-workout-title').textContent = workout.name;

      const blocks = workout.blocks_json?.blocks || [];
      const meta = document.getElementById('modal-workout-meta');
      meta.innerHTML = [
        fmtDuration(workout.total_duration_seconds),
        `${blocks.length} block${blocks.length !== 1 ? 's' : ''}`,
        fmtDate(workout.created_at),
      ].map(t => `<span class="detail-chip">${t}</span>`).join('');

      // Render block breakdown from blocks_json structure
      const dbBlocks = blocks.map((b, i) => ({
        block_index: i,
        rep_count: b.reps || 1,
        intervals: (b.intervals || []).map(iv => ({
          label: iv.label,
          effort_percent: iv.effort,
          duration_seconds: iv.duration,
        })),
      }));
      document.getElementById('modal-workout-blocks').innerHTML = renderBlockBreakdown(dbBlocks);
      document.getElementById('workout-modal').classList.add('open');
    }

    async function startSavedWorkout() {
      const workout = await (await fetch(`/api/workouts/${_activeWorkoutId}`, { headers: authHeaders() })).json();
      const { data: { session } } = await _supabase.auth.getSession();
      const token = session?.access_token || _token;
      const userName = _user.user_metadata?.full_name || _user.email.split('@')[0];

      const res = await fetch('/create-session', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
      });
      const { code } = await res.json();

      // Store template in sessionStorage so host.html can load it
      sessionStorage.setItem('cyclesync_template', JSON.stringify(workout.blocks_json));
      sessionStorage.setItem('cyclesync_template_name', workout.name);

      let url = `/host?code=${code}&name=${encodeURIComponent(userName)}&token=${encodeURIComponent(token)}`;
      url += `&session=${encodeURIComponent(workout.name)}&template=1`;
      window.location.href = url;
    }

    async function deleteSavedWorkout() {
      if (!confirm(`Delete this workout? This cannot be undone.`)) return;
      const res = await fetch(`/api/workouts/${_activeWorkoutId}`, {
        method: 'DELETE', headers: authHeaders(),
      });
      if (res.ok) {
        closeModal('workout-modal');
        // Refresh saved list
        document.getElementById('saved-cards').innerHTML = '';
        document.getElementById('saved-empty').style.display = 'none';
        document.getElementById('saved-loading').style.display = 'block';
        await loadSaved();
      }
    }

    // ── Settings ─────────────────────────────────────────────────────────────
    async function saveSettings() {
      const name = document.getElementById('settings-name').value.trim();
      const fb = document.getElementById('settings-feedback');
      fb.className = 'settings-feedback';
      if (!name) { fb.textContent = 'Name cannot be empty.'; fb.classList.add('err'); return; }
      const res = await fetch('/api/profile', {
        method: 'PATCH', headers: authHeaders(),
        body: JSON.stringify({ full_name: name }),
      });
      if (res.ok) {
        fb.textContent = 'Saved!';
        fb.classList.add('ok');
      } else {
        fb.textContent = 'Could not save. Please try again.';
        fb.classList.add('err');
      }
      setTimeout(() => { fb.className = 'settings-feedback'; }, 3000);
    }

    async function logout() {
      await _supabase.auth.signOut();
      window.location.href = '/auth';
    }
  </script>
</body>
</html>
