<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SYNCD — My Account</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- Session Detail Sheet -->
<div class="sheet-overlay" id="session-sheet" onclick="closeSheet('session-sheet')">
  <div class="sheet" onclick="event.stopPropagation()" style="max-height:85vh;overflow-y:auto;">
    <div class="sheet-handle"></div>
    <div style="padding:0 20px 8px;">
      <div class="sheet-title" id="ss-title">Session</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;" id="ss-meta"></div>

      <div id="ss-riders-wrap" style="margin-bottom:16px;">
        <div class="section-label" style="margin-bottom:8px;">Riders</div>
        <div id="ss-riders" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
      </div>

      <div id="ss-graph-wrap" style="margin-bottom:16px;">
        <div class="section-label" style="margin-bottom:8px;">Effort Over Time</div>
        <div id="ss-effort-bars" style="display:flex;height:40px;border-radius:var(--r-sm);overflow:hidden;gap:1px;"></div>
      </div>

      <div id="ss-blocks"></div>
    </div>
    <div class="sheet-actions">
      <button class="btn btn-secondary" style="width:100%;" onclick="closeSheet('session-sheet')">Close</button>
    </div>
  </div>
</div>

<!-- Workout Detail Sheet -->
<div class="sheet-overlay" id="workout-sheet" onclick="closeSheet('workout-sheet')">
  <div class="sheet" onclick="event.stopPropagation()" style="max-height:85vh;overflow-y:auto;">
    <div class="sheet-handle"></div>
    <div style="padding:0 20px 8px;">
      <div class="sheet-title" id="ws-title">Workout</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;" id="ws-meta"></div>
      <div id="ws-blocks"></div>
    </div>
    <div class="sheet-actions" style="flex-direction:row;">
      <button class="btn btn-danger btn-sm" onclick="deleteSavedWorkout()" style="flex:0 0 auto;width:auto;">Delete</button>
      <button class="btn btn-primary" onclick="startSavedWorkout()" style="flex:1;">Start Session</button>
    </div>
  </div>
</div>

<div class="app">

  <!-- Topbar -->
  <div class="topbar">
    <button class="btn btn-ghost btn-sm" onclick="window.location.href='/'">← Home</button>
    <span class="brand">SYNCD<span class="brand-dot">.</span></span>
    <span style="font-size:12px;color:var(--text-muted);" id="user-label"></span>
  </div>

  <!-- Tab bar -->
  <div class="acct-tabbar">
    <button class="acct-tab active" id="tab-history" onclick="showTab('history')">History</button>
    <button class="acct-tab" id="tab-saved" onclick="showTab('saved')">Saved</button>
    <button class="acct-tab" id="tab-settings" onclick="showTab('settings')">Settings</button>
  </div>

  <div class="scroll">

    <!-- History tab -->
    <div class="acct-section" id="section-history" style="display:block;">
      <div id="history-loading" style="text-align:center;padding:48px 16px;color:var(--text-muted);font-size:14px;">
        Loading sessions…
      </div>
      <div id="history-empty" class="acct-empty" style="display:none;">
        <div style="font-size:36px;margin-bottom:12px;">🚴</div>
        <p>No rides yet. Host a workout to see your history here.</p>
      </div>
      <div id="history-cards"></div>
    </div>

    <!-- Saved Workouts tab -->
    <div class="acct-section" id="section-saved" style="display:none;">
      <div id="saved-loading" style="text-align:center;padding:48px 16px;color:var(--text-muted);font-size:14px;">
        Loading saved workouts…
      </div>
      <div id="saved-empty" class="acct-empty" style="display:none;">
        <div style="font-size:36px;margin-bottom:12px;">💾</div>
        <p>No saved workouts yet.</p>
        <button class="btn btn-secondary btn-sm" onclick="window.location.href='/'" style="margin-top:16px;">Go to Builder</button>
      </div>
      <div id="saved-cards"></div>
    </div>

    <!-- Settings tab -->
    <div class="acct-section" id="section-settings" style="display:none;">
      <div style="max-width:400px;">
        <div class="input-group" style="margin-bottom:16px;">
          <label class="input-label">Display Name</label>
          <input class="inp" type="text" id="settings-name" placeholder="Your display name" />
        </div>
        <div class="input-group" style="margin-bottom:20px;">
          <label class="input-label">Email</label>
          <input class="inp" type="email" id="settings-email" readonly style="opacity:0.5;cursor:not-allowed;" />
        </div>
        <button class="btn btn-primary" onclick="saveSettings()">Save Changes</button>
        <div id="settings-feedback" style="font-size:13px;margin-top:8px;min-height:18px;"></div>
        <hr style="margin:28px 0;border:none;border-top:0.5px solid var(--border);" />
        <button class="btn btn-danger" onclick="logout()" style="width:100%;">Log Out</button>
      </div>
    </div>

  </div>
</div>

<script>
  let _supabase = null, _token = null, _user = null, _activeWorkoutId = null;

  // ── Init ────────────────────────────────────────────────────────────────
  async function init() {
    const res = await fetch('/config');
    const cfg = await res.json();
    if (!cfg.supabase_url) { window.location.href = '/auth'; return; }
    _supabase = window.supabase.createClient(cfg.supabase_url, cfg.supabase_anon_key);
    const { data: { session } } = await _supabase.auth.getSession();
    if (!session) { window.location.href = '/auth'; return; }
    _token = session.access_token;
    _user = session.user;
    const name = _user.user_metadata?.full_name || _user.email.split('@')[0];
    document.getElementById('user-label').textContent = name;
    document.getElementById('settings-name').value = name;
    document.getElementById('settings-email').value = _user.email;
    loadHistory();
    loadSaved();
  }
  init();

  // ── Tabs ────────────────────────────────────────────────────────────────
  function showTab(tab) {
    ['history','saved','settings'].forEach(t => {
      document.getElementById('tab-' + t).classList.toggle('active', t === tab);
      document.getElementById('section-' + t).style.display = t === tab ? 'block' : 'none';
    });
  }

  // ── Helpers ─────────────────────────────────────────────────────────────
  function authHeaders() {
    return { 'Authorization': `Bearer ${_token}`, 'Content-Type': 'application/json' };
  }

  function fmtDuration(secs) {
    if (!secs) return '—';
    const m = Math.floor(secs / 60), s = secs % 60;
    return s > 0 ? `${m}m ${s}s` : `${m}m`;
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function effortColor(pct) {
    const hue = Math.round(120 - pct * 1.2);
    return `hsl(${Math.max(0, hue)},100%,50%)`;
  }

  function chip(text) {
    return `<span class="badge b-neutral">${text}</span>`;
  }

  function openSheet(id) { document.getElementById(id).classList.add('open'); }
  function closeSheet(id) { document.getElementById(id).classList.remove('open'); }

  // ── Session History ──────────────────────────────────────────────────────
  async function loadHistory() {
    const res = await fetch('/api/sessions', { headers: authHeaders() });
    const sessions = res.ok ? await res.json() : [];
    document.getElementById('history-loading').style.display = 'none';
    if (!sessions.length) {
      document.getElementById('history-empty').style.display = 'block';
      return;
    }
    const container = document.getElementById('history-cards');
    sessions.forEach(s => {
      const participants = s.participants || [];
      const card = document.createElement('div');
      card.className = 'session-card';
      card.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
          <span style="font-size:14px;font-weight:600;color:var(--text);">${s.name || 'Untitled Session'}</span>
          ${participants.length ? `<span class="badge b-neutral">${participants.length} rider${participants.length !== 1 ? 's' : ''}</span>` : ''}
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          ${chip(fmtDate(s.started_at || s.created_at))}
          ${s.total_time_seconds ? chip(fmtDuration(s.total_time_seconds)) : ''}
        </div>`;
      card.onclick = () => openSessionSheet(s.id);
      container.appendChild(card);
    });
  }

  async function openSessionSheet(sessionId) {
    const res = await fetch(`/api/sessions/${sessionId}`, { headers: authHeaders() });
    if (!res.ok) return;
    const s = await res.json();

    document.getElementById('ss-title').textContent = s.name || 'Untitled Session';
    document.getElementById('ss-meta').innerHTML = [
      fmtDate(s.started_at || s.created_at),
      fmtDuration(s.total_time_seconds),
      s.host_name ? `Host: ${s.host_name}` : '',
    ].filter(Boolean).map(chip).join('');

    const participants = s.participants || [];
    const ridersWrap = document.getElementById('ss-riders-wrap');
    if (participants.length) {
      ridersWrap.style.display = '';
      document.getElementById('ss-riders').innerHTML =
        participants.map(p => `<span class="badge b-neutral">🚴 ${p.name}</span>`).join('');
    } else {
      ridersWrap.style.display = 'none';
    }

    const blocks = (s.blocks || []).sort((a, b) => a.block_index - b.block_index);
    const graphWrap = document.getElementById('ss-graph-wrap');
    if (blocks.length) {
      graphWrap.style.display = '';
      buildEffortGraph(blocks);
    } else {
      graphWrap.style.display = 'none';
    }

    document.getElementById('ss-blocks').innerHTML = renderBlockBreakdown(blocks);
    openSheet('session-sheet');
  }

  function buildEffortGraph(blocks) {
    const expanded = [];
    blocks.forEach(b => {
      for (let r = 0; r < (b.rep_count || 1); r++) {
        (b.intervals || []).forEach(iv => expanded.push(iv));
      }
    });
    document.getElementById('ss-effort-bars').innerHTML = expanded.map(iv => {
      const color = effortColor(iv.effort_percent || 0);
      return `<div style="flex:${iv.duration_seconds || 1};background:${color};height:100%;cursor:default;" title="${iv.label} — ${iv.effort_percent}%"></div>`;
    }).join('');
  }

  function renderBlockBreakdown(blocks) {
    if (!blocks.length) return `<p style="color:var(--text-muted);font-size:13px;">No interval data.</p>`;
    return blocks.map((b, i) => `
      <div style="margin-bottom:20px;">
        <div class="section-label" style="margin-bottom:8px;">Block ${i + 1}${b.rep_count > 1 ? ` × ${b.rep_count} reps` : ''}</div>
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead>
            <tr>
              <th style="text-align:left;color:var(--text-faint);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.8px;padding:0 8px 8px 0;border-bottom:0.5px solid var(--border);">Interval</th>
              <th style="text-align:left;color:var(--text-faint);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.8px;padding:0 8px 8px 0;border-bottom:0.5px solid var(--border);">Effort</th>
              <th style="text-align:left;color:var(--text-faint);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.8px;padding:0 0 8px 0;border-bottom:0.5px solid var(--border);">Time</th>
            </tr>
          </thead>
          <tbody>
            ${(b.intervals || []).map(iv => `
              <tr>
                <td style="padding:8px 8px 8px 0;border-bottom:0.5px solid rgba(255,255,255,0.04);color:var(--text-muted);">${iv.label || '—'}</td>
                <td style="padding:8px 8px 8px 0;border-bottom:0.5px solid rgba(255,255,255,0.04);color:var(--text-muted);">
                  <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${effortColor(iv.effort_percent || 0)};margin-right:6px;vertical-align:middle;"></span>${iv.effort_percent || 0}%
                </td>
                <td style="padding:8px 0;border-bottom:0.5px solid rgba(255,255,255,0.04);color:var(--text-muted);">${fmtDuration(iv.duration_seconds)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`).join('');
  }

  // ── Saved Workouts ────────────────────────────────────────────────────────
  async function loadSaved() {
    const res = await fetch('/api/workouts', { headers: authHeaders() });
    const workouts = res.ok ? await res.json() : [];
    document.getElementById('saved-loading').style.display = 'none';
    if (!workouts.length) {
      document.getElementById('saved-empty').style.display = 'block';
      return;
    }
    const container = document.getElementById('saved-cards');
    workouts.forEach(w => {
      const blocks = w.blocks_json?.blocks || [];
      const card = document.createElement('div');
      card.className = 'session-card';
      card.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
          <span style="font-size:14px;font-weight:600;color:var(--text);">${w.name}</span>
          <span class="badge b-neutral">${blocks.length} block${blocks.length !== 1 ? 's' : ''}</span>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          ${chip(fmtDuration(w.total_duration_seconds))}
          ${chip(fmtDate(w.created_at))}
        </div>`;
      card.onclick = () => openWorkoutSheet(w);
      container.appendChild(card);
    });
  }

  function openWorkoutSheet(workout) {
    _activeWorkoutId = workout.id;
    document.getElementById('ws-title').textContent = workout.name;

    const blocks = workout.blocks_json?.blocks || [];
    document.getElementById('ws-meta').innerHTML = [
      fmtDuration(workout.total_duration_seconds),
      `${blocks.length} block${blocks.length !== 1 ? 's' : ''}`,
      fmtDate(workout.created_at),
    ].map(chip).join('');

    const dbBlocks = blocks.map((b, i) => ({
      block_index: i,
      rep_count: b.reps || 1,
      intervals: (b.intervals || []).map(iv => ({
        label: iv.label,
        effort_percent: iv.effort,
        duration_seconds: iv.duration,
      })),
    }));
    document.getElementById('ws-blocks').innerHTML = renderBlockBreakdown(dbBlocks);
    openSheet('workout-sheet');
  }

  async function startSavedWorkout() {
    const workout = await (await fetch(`/api/workouts/${_activeWorkoutId}`, { headers: authHeaders() })).json();
    const { data: { session } } = await _supabase.auth.getSession();
    const token = session?.access_token || _token;
    const userName = _user.user_metadata?.full_name || _user.email.split('@')[0];

    const res = await fetch('/create-session', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}` },
    });
    const { code } = await res.json();

    sessionStorage.setItem('cyclesync_template', JSON.stringify(workout.blocks_json));
    sessionStorage.setItem('cyclesync_template_name', workout.name);

    let url = `/host?code=${code}&name=${encodeURIComponent(userName)}&token=${encodeURIComponent(token)}`;
    url += `&session=${encodeURIComponent(workout.name)}&template=1`;
    window.location.href = url;
  }

  async function deleteSavedWorkout() {
    if (!confirm('Delete this workout? This cannot be undone.')) return;
    const res = await fetch(`/api/workouts/${_activeWorkoutId}`, {
      method: 'DELETE', headers: authHeaders(),
    });
    if (res.ok) {
      closeSheet('workout-sheet');
      document.getElementById('saved-cards').innerHTML = '';
      document.getElementById('saved-empty').style.display = 'none';
      document.getElementById('saved-loading').style.display = 'block';
      await loadSaved();
    }
  }

  // ── Settings ──────────────────────────────────────────────────────────────
  async function saveSettings() {
    const name = document.getElementById('settings-name').value.trim();
    const fb = document.getElementById('settings-feedback');
    fb.style.color = '';
    if (!name) { fb.style.color = 'var(--red)'; fb.textContent = 'Name cannot be empty.'; return; }
    const res = await fetch('/api/profile', {
      method: 'PATCH', headers: authHeaders(),
      body: JSON.stringify({ full_name: name }),
    });
    if (res.ok) {
      fb.style.color = 'var(--green)'; fb.textContent = 'Saved!';
    } else {
      fb.style.color = 'var(--red)'; fb.textContent = 'Could not save. Please try again.';
    }
    setTimeout(() => { fb.textContent = ''; }, 3000);
  }

  async function logout() {
    await _supabase.auth.signOut();
    window.location.href = '/auth';
  }
</script>
</body>
</html>
