<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CycleSync — Session</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="card">
    <h1>CycleSync</h1>

    <!-- Lobby (waiting) -->
    <div id="lobby">
        <p>Session: <strong id="lobby-code"></strong></p>
        <h2>Waiting for host to start...</h2>
        <div class="participant-list">
            <ul id="participant-list"></ul>
        </div>
    </div>

    <!-- Live workout -->
    <div id="workout" class="hidden">
        <div class="interval-label" id="interval-label"></div>
        <div class="effort-label" id="effort-label"></div>
        <div class="effort-pct" id="effort-pct"></div>

        <div class="timer-ring-container">
            <svg class="timer-ring" viewBox="0 0 200 200" width="220" height="220">
                <circle class="ring-track"
                        cx="100" cy="100" r="90"
                        fill="none" stroke="#222" stroke-width="10"/>
                <circle class="ring-progress" id="ring-progress"
                        cx="100" cy="100" r="90"
                        fill="none" stroke="#22ff66" stroke-width="10"
                        stroke-linecap="round"
                        stroke-dasharray="565.5" stroke-dashoffset="0"
                        transform="rotate(-90 100 100)"/>
            </svg>
            <div class="ring-center">
                <div class="ring-time" id="timer">0:00</div>
                <div id="status-badge" class="status-badge status-running">● Running</div>
            </div>
        </div>

        <!-- Participants panel -->
        <div class="participants-modal" id="participants-modal">
            <div class="participants-modal-header" onclick="toggleParticipants()">
                <span id="participants-count">Riders</span>
                <span class="modal-chevron" id="modal-chevron">▲</span>
            </div>
            <ul class="participants-modal-list hidden" id="workout-participant-list"></ul>
        </div>

        <!-- Host-only controls -->
        <div id="host-controls" class="hidden" style="margin-top: 12px;">
            <div style="display:flex; gap:8px;">
                <button id="pause-btn" onclick="togglePause()" style="flex:1;">Pause</button>
                <button onclick="endWorkout()" class="danger" style="flex:1;">End Workout</button>
            </div>
        </div>
    </div>

    <!-- Complete -->
    <div id="complete" class="hidden">
        <h2>Workout Complete!</h2>
        <p class="status">Great ride, everyone!</p>
        <button onclick="window.location.href='/'">Back to Home</button>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const name = params.get('name');
    const role = params.get('role') || 'attendee';
    let isPaused = false;
    let currentDuration = 60;
    const CIRCUMFERENCE = 565.5;
    let participantsExpanded = false;

    document.getElementById('lobby-code').textContent = code;

    const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${protocol}://${location.host}/ws/${code}/${encodeURIComponent(name)}/${role}`);

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (data.type === 'participants') {
            const lobbyList = document.getElementById('participant-list');
            if (lobbyList) lobbyList.innerHTML = data.names.map(n => `<li>&#128692; ${n}</li>`).join('');
            const workoutList = document.getElementById('workout-participant-list');
            if (workoutList) workoutList.innerHTML = data.names.map(n => `<li>&#128692; ${n}</li>`).join('');
            const count = document.getElementById('participants-count');
            if (count) count.textContent = `${data.names.length} Rider${data.names.length !== 1 ? 's' : ''}`;
        }

        if (data.type === 'interval_start') {
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('workout').classList.remove('hidden');

            // Show host controls only for the host
            if (role === 'host') {
                document.getElementById('host-controls').classList.remove('hidden');
            }

            const repInfo = data.totalReps > 1
                ? ` — Rep ${data.rep} of ${data.totalReps}`
                : '';

            document.getElementById('interval-label').textContent =
                `Interval ${data.index + 1} of ${data.total}${repInfo}`;
            document.getElementById('effort-label').textContent = data.label;
            document.getElementById('effort-pct').textContent = `${data.effort}% Effort`;

            // Store for ring calculations
            currentDuration = data.duration;

            // Safe ring reset — disable transition to avoid animated reverse
            const ring = document.getElementById('ring-progress');
            ring.style.transition = 'none';
            ring.style.strokeDashoffset = '0';
            requestAnimationFrame(() => { ring.style.transition = ''; });

            // Animate section entrance
            const workoutEl = document.getElementById('workout');
            workoutEl.classList.remove('section-enter');
            void workoutEl.offsetWidth; // force reflow to restart animation
            workoutEl.classList.add('section-enter');

            // Clear paused state on new interval
            setPaused(false);
        }

        if (data.type === 'tick') {
            const mins = Math.floor(data.remaining / 60);
            const secs = String(data.remaining % 60).padStart(2, '0');
            document.getElementById('timer').textContent = `${mins}:${secs}`;

            const fraction = data.remaining / (data.duration || currentDuration);
            document.getElementById('ring-progress').style.strokeDashoffset = CIRCUMFERENCE * (1 - fraction);
        }

        if (data.type === 'paused') {
            setPaused(true);
        }

        if (data.type === 'resumed') {
            setPaused(false);
        }

        if (data.type === 'workout_complete') {
            document.getElementById('workout').classList.add('hidden');
            const completeEl = document.getElementById('complete');
            completeEl.classList.remove('hidden');
            completeEl.classList.add('section-enter');
        }

        if (data.type === 'error') {
            alert(data.message);
            window.location.href = '/';
        }
    };

    function setPaused(paused) {
        isPaused = paused;
        const badge = document.getElementById('status-badge');
        badge.textContent = paused ? '⏸ Paused' : '● Running';
        badge.className = paused ? 'status-badge status-paused' : 'status-badge status-running';
        document.getElementById('ring-progress').style.stroke = paused ? '#555' : '#22ff66';
        if (role === 'host') {
            document.getElementById('pause-btn').textContent = paused ? 'Resume' : 'Pause';
        }
    }

    function toggleParticipants() {
        participantsExpanded = !participantsExpanded;
        document.getElementById('workout-participant-list').classList.toggle('hidden', !participantsExpanded);
        document.getElementById('modal-chevron').textContent = participantsExpanded ? '▼' : '▲';
    }

    function togglePause() {
        ws.send(JSON.stringify({ type: isPaused ? 'resume' : 'pause' }));
    }

    function endWorkout() {
        if (confirm('End the workout for everyone?')) {
            ws.send(JSON.stringify({ type: 'end' }));
        }
    }
</script>
</body>
</html>
