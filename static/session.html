<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CycleSync — Session</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="card">
    <h1>CycleSync</h1>

    <!-- Name entry (used when joining via shared link) -->
    <div id="name-entry" class="hidden">
        <h2>Enter your name to join</h2>
        <input type="text" id="name-input" placeholder="Your name" maxlength="30">
        <button onclick="submitName()">Join Session</button>
    </div>

    <!-- Lobby (waiting) -->
    <div id="lobby">
        <p>Session: <strong id="lobby-code"></strong></p>
        <h2>Waiting for host to start...</h2>
        <div id="countdown-display" class="countdown-display hidden"></div>
        <div class="participant-list">
            <ul id="participant-list"></ul>
        </div>
    </div>

    <!-- Live workout -->
    <div id="workout" class="hidden">
        <div class="interval-label" id="interval-label"></div>
        <div class="effort-label" id="effort-label"></div>
        <div class="effort-pct" id="effort-pct"></div>

        <div class="timer-ring-container">
            <svg class="timer-ring" viewBox="0 0 200 200" width="220" height="220">
                <circle class="ring-track"
                        cx="100" cy="100" r="90"
                        fill="none" stroke="#222" stroke-width="10"/>
                <circle class="ring-progress" id="ring-progress"
                        cx="100" cy="100" r="90"
                        fill="none" stroke="#22ff66" stroke-width="10"
                        stroke-linecap="round"
                        stroke-dasharray="565.5" stroke-dashoffset="0"
                        transform="rotate(-90 100 100)"/>
            </svg>
            <div class="ring-center">
                <div class="ring-time" id="timer">0:00</div>
                <div id="status-badge" class="status-badge status-running">● Working</div>
            </div>
        </div>

        <!-- Participants panel -->
        <div class="participants-modal" id="participants-modal">
            <div class="participants-modal-header" onclick="toggleParticipants()">
                <span id="participants-count">Riders</span>
                <span class="modal-chevron" id="modal-chevron">▲</span>
            </div>
            <ul class="participants-modal-list hidden" id="workout-participant-list"></ul>
        </div>

        <!-- Emoji bar -->
        <div class="emoji-bar">
            <button class="emoji-btn" onclick="sendEmote('👍')">👍</button>
            <button class="emoji-btn" onclick="sendEmote('🥵')">🥵</button>
            <button class="emoji-btn" onclick="sendEmote('🤘')">🤘</button>
            <button class="emoji-btn" onclick="sendEmote('🙌')">🙌</button>
            <button class="emoji-btn" onclick="sendEmote('😝')">😝</button>
        </div>

        <!-- Host-only controls -->
        <div id="host-controls" class="hidden" style="margin-top: 12px;">
            <div style="display:flex; gap:8px;">
                <button id="pause-btn" onclick="togglePause()" style="flex:1;">Pause</button>
                <button onclick="endWorkout()" class="danger" style="flex:1;">End Workout</button>
            </div>
        </div>
    </div>

    <!-- Block break -->
    <div id="block-break" class="hidden">
        <h2 id="block-break-heading">Block Complete!</h2>
        <p class="status">Waiting for host to continue...</p>
        <button id="continue-btn" class="hidden" onclick="continueWorkout()">Continue</button>
    </div>

    <!-- Complete -->
    <div id="complete" class="hidden">
        <h2>Workout Complete!</h2>
        <p class="status">Great ride, everyone!</p>
        <div id="stats-container"></div>
        <button onclick="window.location.href='/'" style="margin-top:16px;">Back to Home</button>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    let name = params.get('name');
    const role = params.get('role') || 'attendee';
    let isPaused = false;
    let currentDuration = 60;
    const CIRCUMFERENCE = 565.5;
    let participantsExpanded = false;
    let ws;
    let completedIntervals = [];
    let sessionStartTime = null;

    document.getElementById('lobby-code').textContent = code;

    function connect() {
        const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(`${protocol}://${location.host}/ws/${code}/${encodeURIComponent(name)}/${role}`);
        ws.onmessage = handleMessage;
    }

    if (!name) {
        document.getElementById('lobby').classList.add('hidden');
        document.getElementById('name-entry').classList.remove('hidden');
    } else {
        connect();
    }

    function submitName() {
        const input = document.getElementById('name-input').value.trim();
        if (!input) return alert('Please enter your name');
        name = input;
        document.getElementById('name-entry').classList.add('hidden');
        document.getElementById('lobby').classList.remove('hidden');
        connect();
    }

    document.getElementById('name-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') submitName();
    });

    function handleMessage(event) {
        const data = JSON.parse(event.data);

        if (data.type === 'participants') {
            const lobbyList = document.getElementById('participant-list');
            if (lobbyList) lobbyList.innerHTML = data.names.map(n => `<li>&#128692; ${n}</li>`).join('');
            const workoutList = document.getElementById('workout-participant-list');
            if (workoutList) workoutList.innerHTML = data.names.map(n => `<li>&#128692; ${n}</li>`).join('');
            const count = document.getElementById('participants-count');
            if (count) count.textContent = `${data.names.length} Rider${data.names.length !== 1 ? 's' : ''}`;
        }

        if (data.type === 'countdown') {
            const el = document.getElementById('countdown-display');
            el.classList.remove('hidden');
            el.textContent = data.count;
            el.style.animation = 'none';
            void el.offsetWidth;
            el.style.animation = '';
        }

        if (data.type === 'interval_start') {
            // Hide block-break screen if transitioning from one
            document.getElementById('block-break').classList.add('hidden');
            document.getElementById('continue-btn').classList.add('hidden');
            document.getElementById('countdown-display').classList.add('hidden');
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('workout').classList.remove('hidden');

            // Track stats
            if (data.index === 0) sessionStartTime = Date.now();
            completedIntervals.push({ label: data.label, effort: data.effort, duration: data.duration });

            if (role === 'host') {
                document.getElementById('host-controls').classList.remove('hidden');
            }

            const repInfo = data.totalReps > 1
                ? ` — Rep ${data.rep} of ${data.totalReps}`
                : '';

            document.getElementById('interval-label').textContent =
                `Interval ${data.index + 1} of ${data.total}${repInfo}`;
            document.getElementById('effort-label').textContent = data.label;
            document.getElementById('effort-pct').textContent = `${data.effort}% Effort`;

            currentDuration = data.duration;

            const ring = document.getElementById('ring-progress');
            ring.style.transition = 'none';
            ring.style.strokeDashoffset = '0';
            requestAnimationFrame(() => { ring.style.transition = ''; });

            const workoutEl = document.getElementById('workout');
            workoutEl.classList.remove('section-enter');
            void workoutEl.offsetWidth;
            workoutEl.classList.add('section-enter');

            setPaused(false);
        }

        if (data.type === 'tick') {
            const mins = Math.floor(data.remaining / 60);
            const secs = String(data.remaining % 60).padStart(2, '0');
            document.getElementById('timer').textContent = `${mins}:${secs}`;

            const fraction = data.remaining / (data.duration || currentDuration);
            document.getElementById('ring-progress').style.strokeDashoffset = CIRCUMFERENCE * (1 - fraction);
        }

        if (data.type === 'paused') {
            setPaused(true);
        }

        if (data.type === 'resumed') {
            setPaused(false);
        }

        if (data.type === 'block_complete') {
            document.getElementById('workout').classList.add('hidden');
            const breakEl = document.getElementById('block-break');
            breakEl.classList.remove('hidden');
            document.getElementById('block-break-heading').textContent =
                `Block ${data.block} of ${data.totalBlocks} Complete!`;
            if (role === 'host') {
                document.getElementById('continue-btn').classList.remove('hidden');
            }
        }

        if (data.type === 'workout_complete') {
            renderStats();
            document.getElementById('workout').classList.add('hidden');
            document.getElementById('block-break').classList.add('hidden');
            const completeEl = document.getElementById('complete');
            completeEl.classList.remove('hidden');
            completeEl.classList.add('section-enter');
        }

        if (data.type === 'emote') {
            showFloatingEmoji(data.emoji);
        }

        if (data.type === 'error') {
            alert(data.message);
            window.location.href = '/';
        }
    }

    function setPaused(paused) {
        isPaused = paused;
        const badge = document.getElementById('status-badge');
        badge.textContent = paused ? '⏸ Paused' : '● Working';
        badge.className = paused ? 'status-badge status-paused' : 'status-badge status-running';
        document.getElementById('ring-progress').style.stroke = paused ? '#555' : '#22ff66';
        if (role === 'host') {
            document.getElementById('pause-btn').textContent = paused ? 'Resume' : 'Pause';
        }
    }

    function toggleParticipants() {
        participantsExpanded = !participantsExpanded;
        document.getElementById('workout-participant-list').classList.toggle('hidden', !participantsExpanded);
        document.getElementById('modal-chevron').textContent = participantsExpanded ? '▼' : '▲';
    }

    function togglePause() {
        ws.send(JSON.stringify({ type: isPaused ? 'resume' : 'pause' }));
    }

    function endWorkout() {
        if (confirm('End the workout for everyone?')) {
            ws.send(JSON.stringify({ type: 'end' }));
        }
    }

    function continueWorkout() {
        ws.send(JSON.stringify({ type: 'continue_block' }));
        document.getElementById('continue-btn').classList.add('hidden');
    }

    function sendEmote(emoji) {
        ws.send(JSON.stringify({ type: 'emote', emoji }));
    }

    function showFloatingEmoji(emoji) {
        const el = document.createElement('div');
        el.className = 'floating-emoji';
        el.textContent = emoji;
        el.style.left = `${15 + Math.random() * 70}%`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2200);
    }

    function renderStats() {
        const totalSecs = sessionStartTime ? Math.round((Date.now() - sessionStartTime) / 1000) : 0;
        const mins = Math.floor(totalSecs / 60);
        const secs = String(totalSecs % 60).padStart(2, '0');
        const n = completedIntervals.length;
        const W = 420, H = 100;
        const barW = n > 0 ? Math.max(4, Math.min(32, (W - 20) / n - 3)) : 0;
        const step = n > 1 ? (W - 20 - barW) / (n - 1) : 0;

        const bars = completedIntervals.map((iv, i) => {
            const barH = (iv.effort / 100) * H;
            const x = 10 + i * step;
            const y = H - barH;
            const hue = Math.round(120 - (iv.effort / 100) * 120);
            return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW}" height="${barH.toFixed(1)}" rx="3" fill="hsl(${hue},85%,50%)"/>`;
        }).join('');

        const svg = `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="display:block;margin:12px 0;">${bars}</svg>`;

        const listItems = completedIntervals.map(iv =>
            `<li><span>${iv.label}</span><span>${iv.effort}% · ${iv.duration}s</span></li>`
        ).join('');

        document.getElementById('stats-container').innerHTML = `
            <div class="stats-section">
                <div class="stats-label">Effort Over Time</div>
                ${svg}
                <div class="stats-label" style="margin-top:16px;">Intervals</div>
                <ul class="stats-list">${listItems}</ul>
                <div class="stats-total">Total time: ${mins}m ${secs}s</div>
            </div>`;
    }
</script>
</body>
</html>
